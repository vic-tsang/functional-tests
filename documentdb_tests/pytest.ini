[pytest]
# Test discovery
testpaths = compatibility/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -vv
    --strict-markers
    --tb=short
    --color=yes

# Make xfail strict by default (XPASS fails the suite)
xfail_strict = true

# Markers for test categorization
markers =
    # Horizontal tags (API Operations)
    find: Find operation tests
    insert: Insert operation tests
    update: Update operation tests
    delete: Delete operation tests
    aggregate: Aggregation pipeline tests
    index: Index management tests
    admin: Administrative command tests
    collection_mgmt: Collection management tests
    
    # Vertical tags (Cross-cutting Features)
    rbac: Role-based access control tests
    decimal128: Decimal128 data type tests
    collation: Collation and sorting tests
    transactions: Transaction tests
    geospatial: Geospatial query tests
    text_search: Text search tests
    validation: Schema validation tests
    ttl: Time-to-live index tests
    
    # Special markers
    smoke: Quick smoke tests for feature detection
    slow: Tests that take longer to execute
    replica: Tests that can only run on a replica
    engine_xfail(engine, reason, raises): expected failure for a specific engine
    no_parallel: Tests that must run sequentially (not in parallel)
    replica_set: Tests that need to run on replica set

# Timeout for tests (seconds)
timeout = 300

# Parallel execution settings
# Use with: pytest -n auto
# Or: pytest -n 4 (for 4 processes)
# Tests marked 'no_parallel' are automatically deferred to a sequential phase.

# JSON report options
# These are command-line options, not config file options
# Use with: pytest --json-report --json-report-file=.test-results/report.json
